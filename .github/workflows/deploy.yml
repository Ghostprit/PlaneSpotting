name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
    build-and-deploy:
        name: Build and Deploy
        runs-on: ubuntu-24.04
        
        steps:
        - name: SSH into AWS EC2 and deploy
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.EC2IPPS }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.SSH_KEY }}
            script: |
              bash ~/deploy.sh
